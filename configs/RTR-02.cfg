! ============================================================
! RTR-02 - Distribution Router
! Contoso Logistics - Network Automation Toolkit Lab
! Platform: Cisco CISCO2911/K9
! IOS: 15.7(3)M5
! Last Updated: 2024-03-15
!
! SANITIZED CONFIG - Passwords and keys replaced with placeholders
! ============================================================

version 15.7
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname RTR-02
!
aaa new-model
!
aaa authentication login default local
aaa authorization exec default local
!
ip domain-name contoso.local
ip ssh version 2
ip ssh time-out 60
ip ssh authentication-retries 3
!
username netadmin privilege 15 secret 5 <password-hash-removed>
!
! ─── Loopback Interface (OSPF Router ID) ───
interface Loopback0
 description OSPF Router ID
 ip address 2.2.2.2 255.255.255.255
!
! ─── Link to RTR-01 ───
interface GigabitEthernet0/0
 description P2P Link to RTR-01
 ip address 10.0.1.2 255.255.255.252
 ip ospf network point-to-point
 duplex auto
 speed auto
 no shutdown
!
! ─── VLAN 20 Gateway ───
interface GigabitEthernet0/1
 description VLAN20 CORP-VOICE Gateway
 ip address 10.10.20.1 255.255.255.0
 duplex auto
 speed auto
 no shutdown
!
! ─── Management Interface ───
interface GigabitEthernet0/2
 description Management Network
 ip address 192.168.100.2 255.255.255.0
 duplex auto
 speed auto
 no shutdown
!
! ─── OSPF Configuration ───
router ospf 1
 router-id 2.2.2.2
 !
 passive-interface GigabitEthernet0/1
 passive-interface GigabitEthernet0/2
 !
 network 2.2.2.2 0.0.0.0 area 0
 network 10.0.1.0 0.0.0.3 area 0
 network 10.10.20.0 0.0.0.255 area 0
 network 192.168.100.0 0.0.0.255 area 0
!
! ─── Default Route (via RTR-01) ───
ip route 0.0.0.0 0.0.0.0 10.0.1.1
!
! ─── VTY Lines (SSH Management) ───
line vty 0 4
 exec-timeout 10 0
 transport input ssh
 login authentication default
!
line con 0
 exec-timeout 5 0
!
end
