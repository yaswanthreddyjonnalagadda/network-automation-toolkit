! ============================================================
! SW-01 - Access Switch
! Contoso Logistics - Network Automation Toolkit Lab
! Platform: Cisco WS-C2960X-48FPS-L
! IOS: 15.2(4)E7
! Last Updated: 2024-03-15
!
! SANITIZED CONFIG - Passwords and keys replaced with placeholders
! ============================================================

version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname SW-01
!
aaa new-model
!
aaa authentication login default local
aaa authorization exec default local
!
ip domain-name contoso.local
ip ssh version 2
!
username netadmin privilege 15 secret 5 <password-hash-removed>
!
! ─── VLAN Database ───
vlan 10
 name CORP-DATA
!
vlan 20
 name CORP-VOICE
!
vlan 30
 name CORP-MGMT
!
vlan 99
 name NATIVE
!
! ─── Access Ports - VLAN 10 (Workstations) ───
! Ports Gi1/0/1 through Gi1/0/24 configured as access ports for workstations
interface range GigabitEthernet1/0/1 - 24
 description CORP-DATA Workstation Port
 switchport mode access
 switchport access vlan 10
 switchport nonegotiate
 spanning-tree portfast
 no shutdown
!
! ─── Access Ports - VLAN 20 (VoIP Phones) ───
! Ports Gi1/0/25 through Gi1/0/40 configured for IP phones
! voice vlan separates voice traffic for QoS
interface range GigabitEthernet1/0/25 - 40
 description CORP-VOICE IP Phone Port
 switchport mode access
 switchport access vlan 10
 switchport voice vlan 20
 switchport nonegotiate
 spanning-tree portfast
 no shutdown
!
! ─── Uplink to RTR-01 (Trunk) ───
! Native VLAN 99 is set to a non-default VLAN to avoid VLAN hopping attacks
interface GigabitEthernet1/0/48
 description Uplink to RTR-01
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30
 no shutdown
!
! ─── Management VLAN Interface ───
! SVI (Switched Virtual Interface) provides Layer 3 access for management
interface Vlan30
 description Management Interface
 ip address 192.168.100.11 255.255.255.0
 no shutdown
!
! ─── Default Gateway for Management Traffic ───
ip default-gateway 192.168.100.1
!
! ─── VTY Lines (SSH Management) ───
line vty 0 15
 exec-timeout 10 0
 transport input ssh
 login authentication default
!
line con 0
 exec-timeout 5 0
!
end
