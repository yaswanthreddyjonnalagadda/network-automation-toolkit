! ============================================================
! RTR-01 - Core Router
! Contoso Logistics - Network Automation Toolkit Lab
! Platform: Cisco CISCO2911/K9
! IOS: 15.7(3)M5
! Last Updated: 2024-03-15
!
! SANITIZED CONFIG - Passwords and keys replaced with placeholders
! ============================================================

version 15.7
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname RTR-01
!
! ─── AAA / Authentication ───
aaa new-model
!
aaa authentication login default local
aaa authorization exec default local
!
! ─── Domain and SSH Configuration ───
! SSH v2 is required for Netmiko automation
ip domain-name contoso.local
ip ssh version 2
ip ssh time-out 60
ip ssh authentication-retries 3
!
! RSA key would be generated with: crypto key generate rsa modulus 2048
! Key not shown in sanitized config
!
! ─── Local User Account for Automation ───
! netadmin account has privilege 15 to avoid needing enable separately
! In production, use a dedicated service account with a strong password
username netadmin privilege 15 secret 5 <password-hash-removed>
!
! ─── Loopback Interface (OSPF Router ID) ───
! Loopback0 is used as the OSPF router ID because it is always up.
! A stable router ID prevents unnecessary OSPF reconvergence.
interface Loopback0
 description OSPF Router ID
 ip address 1.1.1.1 255.255.255.255
!
! ─── WAN Interface ───
interface GigabitEthernet0/0
 description WAN Uplink - Internet/MPLS
 ip address 10.0.0.1 255.255.255.252
 duplex auto
 speed auto
 no shutdown
!
! ─── Link to RTR-02 ───
! /30 subnet used for point-to-point links (only 2 usable IPs needed)
interface GigabitEthernet0/1
 description P2P Link to RTR-02
 ip address 10.0.1.1 255.255.255.252
 ip ospf network point-to-point
 duplex auto
 speed auto
 no shutdown
!
! ─── VLAN 10 Gateway ───
interface GigabitEthernet0/2
 description VLAN10 CORP-DATA Gateway
 ip address 10.10.10.1 255.255.255.0
 duplex auto
 speed auto
 no shutdown
!
! ─── Management Interface ───
interface GigabitEthernet0/3
 description Management Network
 ip address 192.168.100.1 255.255.255.0
 duplex auto
 speed auto
 no shutdown
!
! ─── OSPF Configuration ───
! Using Area 0 (backbone) for simplicity in a single-site design.
! Process ID 1 is arbitrary but consistent across all devices.
! Router ID is set explicitly to Loopback0 address for stability.
router ospf 1
 router-id 1.1.1.1
 !
 ! Passive interfaces don't send OSPF hellos - used for stub networks
 passive-interface GigabitEthernet0/0
 passive-interface GigabitEthernet0/2
 passive-interface GigabitEthernet0/3
 !
 network 1.1.1.1 0.0.0.0 area 0
 network 10.0.1.0 0.0.0.3 area 0
 network 10.10.10.0 0.0.0.255 area 0
 network 192.168.100.0 0.0.0.255 area 0
!
! ─── VTY Lines (SSH Management) ───
line vty 0 4
 exec-timeout 10 0
 transport input ssh
 login authentication default
!
! ─── Console Line ───
line con 0
 exec-timeout 5 0
!
end
